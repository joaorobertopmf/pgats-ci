# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: 'Execução Manual (Self-Hosted)'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
  workflow_dispatch:

# permissões necessárias para publicar checks de teste
permissions:
  contents: read
  checks: write

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  e2e-tests:
    # maquina onde o job vai rodar - nesse caso, um runner self-hosted
    runs-on: self-hosted

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn

      # instala o Chromium e as dependências de sistema necessárias (libatk, libdrm, etc.)
      - name: Instalando Browsers do Playwright
        run: yarn playwright install chromium --with-deps

      # executar os testes e2e
      - name: Executando testes e2e
        run: yarn run e2e

      # publica resultados dos testes como GitHub Check (lê o JUnit XML gerado)
      - name: Publicando relatório de testes
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Playwright E2E Tests
          path: results.xml
          reporter: java-junit